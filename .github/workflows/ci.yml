name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics --exit-zero

      - name: Run tests
        run: pytest tests/ -v --tb=short

  data-validation:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate processed data files
        run: |
          python -c "
          import pandas as pd

          vitals = pd.read_csv('data/mimic_waveform_vitals.csv')
          summary = pd.read_csv('data/mimic_waveform_summary.csv')

          assert len(vitals) > 0, 'Vitals file is empty'
          assert len(summary) > 0, 'Summary file is empty'

          for col in ['subject_id', 'hours', 'spo2', 'respiratory_rate', 'heart_rate']:
              assert col in vitals.columns, f'Missing column: {col}'

          assert vitals['spo2'].between(0, 100).all(), 'SpO2 values out of 0-100 range'

          print(f'Vitals:  {len(vitals):,} rows x {len(vitals.columns)} cols')
          print(f'Summary: {len(summary)} patients')
          print('All data validation checks passed.')
          "
